plugins:
  - rubocop-packaging
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - .git/**/*
    - gemfiles/**/*
    - test/rails_app/**/*
    - tmp/**/*
    - vendor/**/*
    - bin/**/*

Layout/LineLength:
  Exclude:
    - 'Rakefile'

Metrics/AbcSize:
  Exclude:
    - 'Rakefile'
    - 'spec/**/*'
    - 'lib/ruleur/condition.rb'
    - 'lib/ruleur/engine.rb'

Metrics/BlockLength:
  Exclude:
    - 'Rakefile'
    - 'spec/**/*'

Metrics/ClassLength:
  Exclude:
    - 'spec/**/*'
    - 'lib/ruleur/engine.rb'

Metrics/CyclomaticComplexity:
  Exclude:
    - 'Rakefile'
    - 'spec/**/*'
    - 'lib/ruleur/engine.rb'
    - 'lib/ruleur/condition.rb'

Metrics/MethodLength:
  Exclude:
    - 'Rakefile'
    - 'spec/**/*'
    - 'lib/ruleur/engine.rb'
    - 'lib/ruleur/condition.rb'

Metrics/ModuleLength:
  Exclude:
    - 'spec/**/*'

Metrics/PerceivedComplexity:
  Exclude:
    - 'Rakefile'
    - 'spec/**/*'
    - 'lib/ruleur/engine.rb'
    - 'lib/ruleur/condition.rb'

RSpec/ExampleLength:
  Max: 15

RSpec/MultipleExpectations:
  Max: 8

RSpec/SpecFilePathFormat:
  Enabled: false

Style/NumericPredicate:
  Enabled: false
